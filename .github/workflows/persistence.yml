name: Orthogonal Persistence

# Builds and runs the orthogonal-persistence checkpoint/restore test suite and
# the end-to-end "yank power, it remembers" demo headless (no QEMU required:
# the demo drives the real checkpoint engine + snapshot store over a file-backed
# disk, modeling a power cycle as a process restart).

on:
  push:
    paths:
      - 'kernel/checkpoint*.c'
      - 'kernel/snapshot_store.c'
      - 'include/checkpoint*.h'
      - 'include/snapshot_store.h'
      - 'kernel/sched_record.c'
      - 'kernel/scheduler.c'
      - 'include/sched_record.h'
      - 'include/scheduler.h'
      - 'kernel/time_record.c'
      - 'kernel/time_record_sync.c'
      - 'include/time_record.h'
      - 'tests/test_checkpoint*.c'
      - 'tests/test_sched_record.c'
      - 'tests/test_time_record.c'
      - 'kernel/entropy_record.c'
      - 'kernel/entropy_record_sync.c'
      - 'include/entropy_record.h'
      - 'tests/test_entropy_record.c'
      - 'kernel/replay_engine.c'
      - 'kernel/replay_engine_sync.c'
      - 'include/replay_engine.h'
      - 'tests/test_replay_engine.c'
      - 'kernel/divergence.c'
      - 'kernel/divergence_sync.c'
      - 'include/divergence.h'
      - 'tests/test_divergence.c'
      - 'tests/test_snapshot_store.c'
      - 'tests/test_persistence_e2e.c'
      - 'scripts/test/persistence_demo.sh'
      - 'kernel/keyframe_ring.c'
      - 'include/keyframe_ring.h'
      - 'tests/test_keyframe_ring.c'
      - 'kernel/rewind.c'
      - 'kernel/rewind_sync.c'
      - 'include/rewind.h'
      - 'tests/test_rewind.c'
      - 'kernel/reverse.c'
      - 'kernel/reverse_sync.c'
      - 'include/reverse.h'
      - 'tests/test_reverse.c'
      - 'kernel/revbreak.c'
      - 'kernel/revbreak_sync.c'
      - 'include/revbreak.h'
      - 'tests/test_revbreak.c'
      - 'kernel/gdbstub.c'
      - 'kernel/gdbstub_sync.c'
      - 'include/gdbstub.h'
      - 'tests/test_gdbstub.c'
      - 'tests/timetravel_e2e.c'
      - 'scripts/test/timetravel_demo.sh'
      - 'tests/scrub_e2e.c'
      - 'scripts/test/scrub_demo.sh'
      - 'kernel/mcp.c'
      - 'kernel/mcp_sync.c'
      - 'include/mcp.h'
      - 'tests/test_mcp.c'
      - 'tests/mcp_heisenbug_e2e.c'
      - 'scripts/test/mcp_heisenbug_demo.sh'
      - 'kernel/journal_capture.c'
      - 'kernel/journal_capture_sync.c'
      - 'include/journal_capture.h'
      - 'tests/test_journal_capture.c'
      - 'kernel/keyframe_store.c'
      - 'kernel/keyframe_store_sync.c'
      - 'include/keyframe_store.h'
      - 'tests/test_keyframe_store.c'
      - 'kernel/replay_driver.c'
      - 'kernel/replay_driver_sync.c'
      - 'include/replay_driver.h'
      - 'tests/test_replay_driver.c'
      - 'kernel/divergence_scan.c'
      - 'kernel/divergence_scan_sync.c'
      - 'include/divergence_scan.h'
      - 'tests/test_divergence_scan.c'
      - 'kernel/gdb_serial.c'
      - 'kernel/gdb_serial_sync.c'
      - 'include/gdb_serial.h'
      - 'tests/test_gdb_serial.c'
      - '.github/workflows/persistence.yml'
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compiler version
        run: gcc --version

      - name: Freestanding compile check (kernel modules)
        run: |
          set -e
          for f in kernel/checkpoint.c kernel/snapshot_store.c kernel/checkpoint_extstate.c kernel/checkpoint_ide.c kernel/checkpoint_barrier.c kernel/checkpoint_proctable.c kernel/checkpoint_proctable_sync.c kernel/checkpoint_filetable.c kernel/checkpoint_filetable_sync.c kernel/checkpoint_ipc.c kernel/checkpoint_ipc_sync.c kernel/checkpoint_driver.c kernel/checkpoint_disk.c kernel/checkpoint_disk_sync.c kernel/checkpoint_fb.c kernel/checkpoint_fb_sync.c kernel/checkpoint_restore_seq.c kernel/checkpoint_boot_v2.c kernel/checkpoint_journal.c kernel/sched_record.c kernel/time_record.c kernel/time_record_sync.c kernel/entropy_record.c kernel/entropy_record_sync.c kernel/replay_engine.c kernel/replay_engine_sync.c kernel/divergence.c kernel/divergence_sync.c kernel/keyframe_ring.c kernel/rewind.c kernel/rewind_sync.c kernel/reverse.c kernel/reverse_sync.c kernel/revbreak.c kernel/revbreak_sync.c kernel/gdbstub.c kernel/gdbstub_sync.c kernel/mcp.c kernel/mcp_sync.c kernel/journal_capture.c kernel/journal_capture_sync.c kernel/keyframe_store.c kernel/keyframe_store_sync.c kernel/replay_driver.c kernel/replay_driver_sync.c kernel/divergence_scan.c kernel/divergence_scan_sync.c kernel/gdb_serial.c kernel/gdb_serial_sync.c kernel/ramdisk.c; do
            echo "freestanding: $f"
            gcc -ffreestanding -fno-stack-protector -m64 -Iinclude -Wall -Wextra -fsyntax-only "$f"
          done

      - name: Checkpoint / store / restore unit tests
        run: |
          set -e
          cd tests
          K="../kernel/checkpoint.c ../kernel/snapshot_store.c ../kernel/checkpoint_extstate.c ../kernel/checkpoint_barrier.c"
          KR="$K ../kernel/ramdisk.c"
          gcc -I../include -Wall -o /tmp/t_store  test_snapshot_store.c            && /tmp/t_store
          gcc -I../include -Wall -o /tmp/t_bar    test_checkpoint_barrier.c   ../kernel/checkpoint_barrier.c && /tmp/t_bar
          gcc -I../include -Wall -o /tmp/t_kern   test_checkpoint_kernel.c    $K && /tmp/t_kern
          gcc -I../include -Wall -o /tmp/t_proc   test_checkpoint_proctable.c ../kernel/checkpoint_proctable.c && /tmp/t_proc
          gcc -I../include -Wall -o /tmp/t_file   test_checkpoint_filetable.c ../kernel/checkpoint_filetable.c ../kernel/checkpoint_extstate.c && /tmp/t_file
          gcc -I../include -Wall -o /tmp/t_ipc    test_checkpoint_ipc.c       ../kernel/checkpoint_ipc.c && /tmp/t_ipc
          gcc -I../include -Wall -o /tmp/t_drv    test_checkpoint_driver.c    ../kernel/checkpoint_driver.c && /tmp/t_drv
          gcc -I../include -Wall -o /tmp/t_disk   test_checkpoint_disk.c      ../kernel/checkpoint_disk.c && /tmp/t_disk
          gcc -I../include -Wall -o /tmp/t_fb     test_checkpoint_fb.c        ../kernel/checkpoint_fb.c && /tmp/t_fb
          gcc -I../include -Wall -o /tmp/t_seq    test_checkpoint_restore_seq.c ../kernel/checkpoint_restore_seq.c && /tmp/t_seq
          gcc -I../include -Wall -o /tmp/t_ckpt   test_checkpoint.c            $K && /tmp/t_ckpt
          gcc -I../include -Wall -o /tmp/t_wb     test_checkpoint_writeback.c  $K && /tmp/t_wb
          gcc -I../include -Wall -o /tmp/t_rs     test_checkpoint_restore.c    $K && /tmp/t_rs
          gcc -I../include -Wall -o /tmp/t_ctx    test_checkpoint_context.c    $K && /tmp/t_ctx
          gcc -I../include -Wall -o /tmp/t_rc     test_checkpoint_reconstruct.c $K && /tmp/t_rc
          gcc -I../include -Wall -o /tmp/t_ro     test_checkpoint_readonly.c   $K && /tmp/t_ro
          gcc -I../include -Wall -o /tmp/t_tm     test_checkpoint_timer.c      $K && /tmp/t_tm
          gcc -I../include -Wall -o /tmp/t_ext    test_checkpoint_extstate.c   ../kernel/checkpoint_extstate.c && /tmp/t_ext
          gcc -I../include -Wall -o /tmp/t_init   test_persistence_init.c     $KR && /tmp/t_init
          gcc -I../include -Wall -o /tmp/t_ide    test_checkpoint_ide.c       ../kernel/checkpoint_ide.c ../kernel/snapshot_store.c && /tmp/t_ide
          gcc -I../include -Wall -o /tmp/t_jrnl   test_checkpoint_journal.c   ../kernel/checkpoint_journal.c && /tmp/t_jrnl
          gcc -I../include -Wall -o /tmp/t_sr     test_sched_record.c         ../kernel/sched_record.c && /tmp/t_sr
          gcc -I../include -Wall -o /tmp/t_time   test_time_record.c          ../kernel/time_record.c && /tmp/t_time
          gcc -I../include -Wall -o /tmp/t_ent    test_entropy_record.c       ../kernel/entropy_record.c && /tmp/t_ent
          gcc -I../include -Wall -o /tmp/t_replay test_replay_engine.c        ../kernel/replay_engine.c && /tmp/t_replay
          gcc -I../include -Wall -o /tmp/t_div    test_divergence.c           ../kernel/divergence.c && /tmp/t_div
          gcc -I../include -Wall -o /tmp/t_kfr    test_keyframe_ring.c        ../kernel/keyframe_ring.c && /tmp/t_kfr
          gcc -I../include -Wall -o /tmp/t_rw     test_rewind.c               ../kernel/rewind.c ../kernel/keyframe_ring.c ../kernel/replay_engine.c && /tmp/t_rw
          gcc -I../include -Wall -o /tmp/t_rev    test_reverse.c              ../kernel/reverse.c ../kernel/rewind.c ../kernel/keyframe_ring.c ../kernel/replay_engine.c && /tmp/t_rev
          gcc -I../include -Wall -o /tmp/t_rb     test_revbreak.c             ../kernel/revbreak.c ../kernel/reverse.c ../kernel/rewind.c ../kernel/keyframe_ring.c ../kernel/replay_engine.c && /tmp/t_rb
          gcc -I../include -Wall -o /tmp/t_gdb    test_gdbstub.c              ../kernel/gdbstub.c && /tmp/t_gdb
          gcc -I../include -Wall -o /tmp/t_mcp    test_mcp.c                  ../kernel/mcp.c && /tmp/t_mcp
          gcc -I../include -Wall -o /tmp/t_jc     test_journal_capture.c      ../kernel/journal_capture.c ../kernel/checkpoint_journal.c && /tmp/t_jc
          gcc -I../include -Wall -o /tmp/t_ks     test_keyframe_store.c       ../kernel/keyframe_store.c ../kernel/snapshot_store.c ../kernel/keyframe_ring.c && /tmp/t_ks
          gcc -I../include -Wall -o /tmp/t_rd     test_replay_driver.c        ../kernel/replay_driver.c ../kernel/replay_engine.c && /tmp/t_rd
          gcc -I../include -Wall -o /tmp/t_ds     test_divergence_scan.c      ../kernel/divergence_scan.c ../kernel/divergence.c && /tmp/t_ds
          gcc -I../include -Wall -o /tmp/t_gsl    test_gdb_serial.c           ../kernel/gdb_serial.c ../kernel/gdbstub.c ../kernel/gdbstub_sync.c && /tmp/t_gsl

  e2e-demo:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: End-to-end "yank power, it remembers" demo
        run: bash scripts/test/persistence_demo.sh
      - name: Time-travel "record, replay, byte-identical" demo
        run: bash scripts/test/timetravel_demo.sh
      - name: Time-travel "scrub the machine backwards" demo
        run: bash scripts/test/scrub_demo.sh
      - name: MCP heisenbug demo (agent rewinds to find the bug)
        run: bash scripts/test/mcp_heisenbug_demo.sh
      - name: In-QEMU boot demo (skips gracefully if QEMU is unavailable)
        run: bash scripts/test/qemu_persistence_demo.sh
